<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet-Vision Dispatch Test</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Fleet-Vision</p>
            <h1>Dispatch Test Console</h1>
            <p class="subtitle">Upload 5 vehicle angles, enter a destination, and verify model gating plus routing in one click.</p>
        </section>

        <section class="panel">
            <form id="requestForm" class="form">
                <div class="grid">
                    <label>Front<input type="file" name="front" accept="image/*" required></label>
                    <label>Back<input type="file" name="back" accept="image/*" required></label>
                    <label>Left<input type="file" name="left" accept="image/*" required></label>
                    <label>Right<input type="file" name="right" accept="image/*" required></label>
                    <label>Roof<input type="file" name="roof" accept="image/*" required></label>
                </div>

                <label>Destination<input type="text" name="destination" placeholder="e.g. Lahore Airport" required></label>

                <div class="actions">
                    <button type="submit">Run Dispatch Check</button>
                    <button type="button" id="loadDemo">Load Demo State</button>
                </div>
            </form>
        </section>

        <section class="panel result-panel">
            <div class="result-head">
                <h2>Dispatch Report</h2>
                <span id="statusBadge" class="badge neutral">Idle</span>
            </div>
            <pre id="output">Submit the form to see the API response here.</pre>
        </section>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
