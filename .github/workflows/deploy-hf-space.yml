name: Deploy To Hugging Face Space

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.HF_TOKEN }}" || (echo "Missing secret: HF_TOKEN" && exit 1)
          test -n "${{ secrets.HF_SPACE_REPO }}" || (echo "Missing secret: HF_SPACE_REPO" && exit 1)

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone Hugging Face Space repository
        run: |
          git clone https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_REPO }} hf-space

      - name: Sync files to Space repo
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "__pycache__" \
            ./ hf-space/

      - name: Ensure Docker Space metadata in README
        run: |
          if [ ! -f hf-space/README.md ]; then
            cat > hf-space/README.md << 'EOF'
          ---
          title: FleetThing
          emoji: car
          colorFrom: blue
          colorTo: green
          sdk: docker
          pinned: false
          ---

          FleetThing Docker Space
          EOF
          fi

      - name: Commit and push if changed
        run: |
          cd hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "ci: deploy from GitHub ${GITHUB_SHA}"
          git push
